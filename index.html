<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunisian Photography</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>
<body>

<!-- Preloader -->
<div id="preloader"><span></span></div>

<!-- Header -->
<header>
  <div class="logo">Tunisian Photography</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button id="darkModeToggle">🌙</button></li>
    </ul>
  </nav>
</header>

<!-- Social Buttons -->
<div class="social-fixed">
    <!-- WhatsApp: opens chat with your number -->
    <a href="https://wa.me/21650243344" target="_blank" rel="noopener">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>
  
    <!-- Instagram: opens your profile -->
    <a href="https://www.instagram.com/_farah_chaabane_/" target="_blank" rel="noopener">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
    </a>
  </div>
  
  

<!-- Lightbox -->
<div class="lightbox"><img></div>

<!-- Hero Slider Section -->
<section id="home" class="hero-slider">
    <div class="slides">
      <div class="slide"><img src="https://picsum.photos/1600/900?random=1" alt="Slide 1"></div>
      <div class="slide"><img src="https://picsum.photos/1600/900?random=2" alt="Slide 2"></div>
      <div class="slide"><img src="https://picsum.photos/1600/900?random=3" alt="Slide 3"></div>
      <div class="slide"><img src="https://picsum.photos/1600/900?random=4" alt="Slide 4"></div>
      <div class="slide"><img src="https://picsum.photos/1600/900?random=5" alt="Slide 5"></div>
      <div class="slide"><img src="https://picsum.photos/1600/900?random=6" alt="Slide 6"></div>
    </div>
  
    <!-- Overlay Text -->
    <div class="hero-text">
      <h1>Capturing Emotions</h1>
      <p>Professional Photography & Visual Storytelling</p>
      <a href="#photography" class="hero-btn">View Work</a>
    </div>
  
    <!-- Slider Arrows -->
    <button class="prev-slide">&#10094;</button>
    <button class="next-slide">&#10095;</button>
  </section>
  
  <!-- Photography Section -->
<section id="photography">
    <h2>Portfolio</h2>
    <div class="portfolio-grid gallery">
      <!-- Instagram photos (replace src with your Instagram image URLs) -->
     <a href="portraits.html" class="portfolio-btn">
      <img src="https://picsum.photos/400?random=101" alt="Portraits">
      <span>Portraits</span>
    </a>
    <a href="landscape.html" class="portfolio-btn">
      <img src="https://picsum.photos/400?random=201" alt="Landscape">
      <span>Landscape</span>
    </a>
    <a href="weddings.html" class="portfolio-btn">
      <img src="https://picsum.photos/400?random=301" alt="Weddings">
      <span>Weddings</span>
    </a>
    <a href="commercial.html" class="portfolio-btn">
      <img src="https://picsum.photos/400?random=401" alt="Street">
      <span>Street</span>
    </a>
    </div>
  </section>

<!-- Footer -->
<footer>
    <p> Tunisian Photography | Based in Monastir , Tunisia</p>
  </footer>
  

</body>
</html>
