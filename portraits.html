<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portraits - Tunisian Photography</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
<style>
.page-title { text-align: center; margin: 6rem 0 2rem; font-size: 2.2rem; }
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  padding: 2rem 6%;
  max-width: 1400px;
  margin: auto;
}
.portfolio-item {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.4s;
}
.portfolio-item img {
  width: 100%;
  height: 380px;
  object-fit: cover;
  transition: 0.4s;
}
.portfolio-item:hover img { transform: scale(1.08); }
</style>
</head>
<body>

<header>
  <div class="logo">Tunisian Photography</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button id="darkModeToggle">🌙</button></li>
    </ul>
  </nav>
</header>

<div class="social-fixed">
  <a href="https://wa.me/21650243344" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"></a>
  <a href="https://www.instagram.com/_farah_chaabane_/" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram"></a>
</div>

<h1 class="page-title">Portraits</h1>

<div class="portfolio-grid">
  <div class="portfolio-item"><img src="https://picsum.photos/id/1011/600/400" alt="Portrait 1"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/id/1012/600/400" alt="Portrait 2"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/id/1013/600/400" alt="Portrait 3"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/id/1014/600/400" alt="Portrait 4"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/id/1015/600/400" alt="Portrait 5"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/id/1016/600/400" alt="Portrait 6"></div>
</div>

<script>
// Dark mode
const darkModeBtn = document.getElementById('darkModeToggle');
if(localStorage.getItem('theme')==='dark'){ document.body.classList.add('dark'); darkModeBtn.textContent='☀️'; }
darkModeBtn.addEventListener('click',()=>{
  document.body.classList.toggle('dark');
  if(document.body.classList.contains('dark')){
    localStorage.setItem('theme','dark'); darkModeBtn.textContent='☀️';
  } else {
    localStorage.setItem('theme','light'); darkModeBtn.textContent='🌙';
  }
});

// Lightbox (optional - add if you want click to enlarge)
const lightbox = document.createElement('div');
lightbox.className = 'lightbox';
lightbox.innerHTML = '<img>';
document.body.appendChild(lightbox);

document.querySelectorAll('.portfolio-item img').forEach(img => {
  img.addEventListener('click', () => {
    lightbox.style.display = 'flex';
    lightbox.querySelector('img').src = img.src;
  });
});
lightbox.addEventListener('click', () => { lightbox.style.display = 'none'; });
</script>

</body>
</html>
