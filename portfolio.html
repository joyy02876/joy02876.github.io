<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Tunisian Photography</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
<style>
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 1rem;
  padding: 2rem 5%;
  max-width: 1200px;
  margin: auto;
}
.portfolio-item {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease;
}
.portfolio-item img {
  width: 100%;
  display: block;
  border-radius: 15px;
  transition: transform 0.4s ease;
}
.portfolio-item:hover img {
  transform: scale(1.08);
}
.portfolio-item span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 1.5rem;
  font-weight: bold;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
  text-align: center;
  pointer-events: none;
}
.page-title {
  text-align: center;
  margin: 6rem 0 2rem;
  font-size: 2.2rem;
}
</style>
</head>
<body>

<header>
  <div class="logo">Tunisian Photography</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button id="darkModeToggle">🌙</button></li>
    </ul>
  </nav>
</header>

<div class="social-fixed">
  <a href="https://wa.me/21650243344" target="_blank" rel="noopener">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
  </a>
  <a href="https://www.instagram.com/_farah_chaabane_/" target="_blank" rel="noopener">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
  </a>
</div>

<h1 class="page-title">Portfolio</h1>

<div class="portfolio-grid">
  <a href="portraits.html" class="portfolio-item">
    <img src="https://picsum.photos/500?101" alt="Portraits">
    <span>Portraits</span>
  </a>
  <a href="landscape.html" class="portfolio-item">
    <img src="https://picsum.photos/500?102" alt="Landscape">
    <span>Landscape</span>
  </a>
  <a href="weddings.html" class="portfolio-item">
    <img src="https://picsum.photos/500?103" alt="Weddings">
    <span>Weddings</span>
  </a>
  <a href="street.html" class="portfolio-item">
    <img src="https://picsum.photos/500?104" alt="Street">
    <span>Street</span>
  </a>
</div>

<div class="lightbox">
  <img>
</div>

<footer>
  <p>© 2026 Tunisian Photography | All Rights Reserved</p>
</footer>

<script>
// Dark Mode
const darkModeBtn = document.getElementById('darkModeToggle');
if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark'); darkModeBtn.textContent='☀️';}
else{darkModeBtn.textContent='🌙';}
darkModeBtn.addEventListener('click',()=>{
  document.body.classList.toggle('dark');
  if(document.body.classList.contains('dark')){
    localStorage.setItem('theme','dark'); darkModeBtn.textContent='☀️';
  }else{
    localStorage.setItem('theme','light'); darkModeBtn.textContent='🌙';
  }
});

// Lightbox
const lightbox=document.querySelector('.lightbox');
const lightboxImg=lightbox.querySelector('img');
document.querySelectorAll('.portfolio-item img').forEach(img=>{
  img.addEventListener('click',()=>{lightbox.style.display='flex'; lightboxImg.src=img.src;});
});
lightbox.addEventListener('click',()=>{lightbox.style.display='none';});
</script>

</body>
</html>
