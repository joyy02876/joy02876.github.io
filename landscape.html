<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landscape - Tunisian Photography</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
<style>
.page-title { text-align: center; margin: 6rem 0 2rem; font-size: 2.2rem; }
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 1rem;
  padding: 2rem 5%;
  max-width: 1200px;
  margin: auto;
}
.portfolio-item {
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}
.portfolio-item img {
  width: 100%;
  display: block;
  border-radius: 15px;
  transition: 0.4s ease;
}
.portfolio-item:hover img { transform: scale(1.08); }
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}
.lightbox img { max-width: 90%; max-height: 90vh; border-radius: 5px; }
.page-nav {
  display: flex;
  justify-content: space-between;
  max-width: 1200px;
  margin: 3rem auto 4rem;
  padding: 0 5%;
}
.page-nav button {
  padding: .8rem 1.6rem;
  border: none;
  background: #e67e22;
  color: white;
  border-radius: 25px;
  cursor: pointer;
  font-size: 1rem;
  transition: .3s;
}
.page-nav button:hover { transform: scale(1.05); }
</style>
</head>
<body>

<header>
  <div class="logo">Tunisian Photography</div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button id="darkModeToggle">🌙</button></li>
    </ul>
  </nav>
</header>

<div class="social-fixed">
  <a href="https://wa.me/21650243344" target="_blank" rel="noopener">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
  </a>
  <a href="https://www.instagram.com/_farah_chaabane_/" target="_blank" rel="noopener">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
  </a>
</div>

<h1 class="page-title">Landscape</h1>

<div class="portfolio-grid">
  <div class="portfolio-item"><img src="https://picsum.photos/500?101"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/500?102"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/500?103"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/500?104"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/500?105"></div>
  <div class="portfolio-item"><img src="https://picsum.photos/500?106"></div>
</div>

<div class="page-nav">
  <button id="prevBtn">⬅ Previous</button>
  <button id="nextBtn">Next ➡</button>
</div>

<div class="lightbox">
  <img>
</div>

<script>
// Lightbox
const lightbox = document.querySelector('.lightbox');
const lightboxImg = lightbox.querySelector('img');
document.querySelectorAll('.portfolio-item img').forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = 'flex';
    lightboxImg.src = img.src;
  });
});
lightbox.addEventListener("click", () => { lightbox.style.display = 'none'; });

// Dark Mode
const darkModeBtn = document.getElementById('darkModeToggle');
if(localStorage.getItem('theme')==='dark'){ document.body.classList.add('dark'); darkModeBtn.textContent='☀️'; }
else{ darkModeBtn.textContent='🌙'; }
darkModeBtn.addEventListener('click',()=>{
  document.body.classList.toggle('dark');
  if(document.body.classList.contains('dark')){
    localStorage.setItem('theme','dark'); darkModeBtn.textContent='☀️';
  }else{
    localStorage.setItem('theme','light'); darkModeBtn.textContent='🌙';
  }
});

// Page Navigation
const pages = ["portraits.html", "landscape.html", "weddings.html", "street.html"];
const currentPage = window.location.pathname.split("/").pop();
let currentIndex = pages.indexOf(currentPage);
if (currentIndex === -1) currentIndex = 0;

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

prevBtn.addEventListener("click", () => {
  const target = pages[(currentIndex - 1 + pages.length) % pages.length];
  window.location.href = target;
});

nextBtn.addEventListener("click", () => {
  const target = pages[(currentIndex + 1) % pages.length];
  window.location.href = target;
});
</script>

</body>
</html>
